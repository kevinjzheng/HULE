services:
  - type: web
    name: hule-server
    runtime: node
    plan: free
    buildCommand: npm install && cd server && npm install && npm run build && npm install --prefix ../dist/server/server --ignore-scripts ws msedge-tts
    startCommand: node dist/server/server/index.js
    envVars:
      - key: NODE_VERSION
        value: 22
